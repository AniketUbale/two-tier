apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-pods
  namespace: 2tier
spec:
  serviceName: db-headless
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: mysql
          image: postgres:alpine
          ports:
           - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: two_tier_app
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: db-headless
  namespace: 2tier
spec:
  clusterIP: None
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
