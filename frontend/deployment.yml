apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: 2tier-frontend
  namespace: 2tier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
        labels:
          app: frontend
    spec:
      containers:
          - name: frontend-container 
            image: aniketu/2tier-ui:latest
            ports:
              - containerPort: 3000
---
apiVersion: v1 
kind: Service 
metadata:
  name: frontend-service
  namespace: 2tier
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
    
