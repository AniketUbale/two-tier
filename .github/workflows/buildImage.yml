name: frontend build and push docker image to dockerhub
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3
      - name: change directory to frontend
        run: |
          cd frontend
          ls -l
      - name: build image
        run: |
          docker build -t test-image .
          
